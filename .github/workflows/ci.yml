name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

# Cancel in-progress CI for the same ref when a newer commit arrives.
# The longest jobs (release-smoke, full pytest matrix) are expensive on
# the new larger runners — wasting minutes on superseded commits is
# worth avoiding.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # quality — the required PR gate. Single Linux 3.12 job that runs every
  # static / type / coverage / security / installer check. Lives on the
  # large GitHub-hosted Linux runner so it finishes fast.
  # -------------------------------------------------------------------------
  quality:
    runs-on: ubuntu-latest-m
    timeout-minutes: 25
    env:
      PYTHONPATH: src
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install
        run: python -m pip install --require-hashes -r requirements/ci.txt
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Pre-commit
        run: pre-commit run --all-files
      - name: Type check
        # Force bash on every runner — the multi-line mypy invocations
        # below use ``\`` line continuations, which PowerShell (the
        # default shell on ``windows-latest``) parses as a unary
        # operator and fails with "Missing expression after unary
        # operator '--'". ``shell: bash`` picks Git Bash on Windows
        # and the system bash elsewhere, so the script is portable.
        shell: bash
        run: |
          mypy src/vaner/__init__.py src/vaner/server.py src/vaner/cli/main.py
          # 0.8.0 modules — strict scope, only 4 disables (untyped-def/call
          # from third-party libs and unused-ignore). Keep this tight.
          mypy \
            --disable-error-code no-untyped-def \
            --disable-error-code no-untyped-call \
            --disable-error-code untyped-decorator \
            --disable-error-code unused-ignore \
            src/vaner/intent/calibration.py \
            src/vaner/intent/ev.py \
            src/vaner/intent/abstain.py \
            src/vaner/store/profile_store.py
          # Legacy scope — broader disables tolerated while we incrementally
          # tighten types module-by-module.
          mypy \
            --disable-error-code no-untyped-def \
            --disable-error-code no-untyped-call \
            --disable-error-code untyped-decorator \
            --disable-error-code call-arg \
            --disable-error-code arg-type \
            --disable-error-code operator \
            --disable-error-code assignment \
            --disable-error-code no-redef \
            --disable-error-code comparison-overlap \
            --disable-error-code unused-ignore \
            src/vaner/mcp/server.py src/vaner/daemon/http.py \
            src/vaner/intent/allocator.py \
            src/vaner/intent/taxonomy.py \
            src/vaner/intent/volatility.py \
            src/vaner/intent/profile.py \
            src/vaner/learning/counterfactual.py \
            src/vaner/defaults/loader.py
      - name: AGENTS.md primer in sync with canonical guidance
        run: python scripts/sync_agents_primer.py --check
      - name: Replay regression
        run: pytest tests/test_replay_regression.py -v
      - name: Tests + coverage
        run: pytest tests -m "not slow and not integration" --cov=src/vaner --cov-fail-under=70
      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          fail_ci_if_error: false
      - name: Security audit
        # CVE-2026-3219 applies to pip itself. pip 26.0.1 is both the
        # latest release and the vulnerable version — no upstream fix
        # is available yet. Dismissed in Dependabot as ``tolerable_risk``
        # with --require-hashes as the compensating control in CI. Drop
        # the ignore flag once a patched pip release ships.
        run: pip-audit --ignore-vuln CVE-2026-3219
      - name: Installer lint and dry-run smoke
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck scripts/install.sh
          bash scripts/install.sh --dry-run --yes --backend uv

  # -------------------------------------------------------------------------
  # compatibility — broader Python/OS coverage. Skips ruff/pre-commit/mypy
  # (already done in quality) and runs only the test suite. Smaller matrix
  # than the old `verify` job (4 entries vs 7) to keep wall-clock low while
  # still covering every supported Python on Linux + a macOS + Windows
  # signal. Schedule/main can later expand this if needed.
  # -------------------------------------------------------------------------
  compatibility:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.test-kind == 'windows' }}
    timeout-minutes: 25
    env:
      PYTHONPATH: src
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest-m
            python-version: "3.11"
            test-kind: non-windows
          - os: ubuntu-latest-m
            python-version: "3.13"
            test-kind: non-windows
          - os: macos-latest
            python-version: "3.12"
            test-kind: non-windows
          - os: windows-latest-l
            python-version: "3.12"
            test-kind: windows
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install
        run: python -m pip install --require-hashes -r requirements/ci.txt
      - name: Tests (non-windows)
        if: matrix.test-kind == 'non-windows'
        run: pytest tests -m "not slow and not integration"
      - name: Tests (windows)
        if: matrix.test-kind == 'windows'
        # Keep a lightweight Windows signal until asyncio/CLI teardown flakes are stabilized.
        run: |
          pytest tests/test_api.py tests/test_broker tests/test_policy tests/test_store -p no:randomly

  # -------------------------------------------------------------------------
  # examples-smoke — quick check that the shipped multi-backend example
  # remains coherent with the engine surface. Cheap; runs on the larger
  # Linux runner.
  # -------------------------------------------------------------------------
  examples-smoke:
    runs-on: ubuntu-latest-m
    timeout-minutes: 10
    env:
      PYTHONPATH: src
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install Vaner
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
      - name: Basic usage smoke-test
        run: |
          tmpdir="$(mktemp -d)"
          python -m vaner.cli.main init --path "$tmpdir"
          test -d "$tmpdir/.vaner"
      - name: Multi-backend example smoke-test
        run: |
          test -f examples/multi-backend/README.md
          grep -En "backends.openai|vaner proxy|X-Vaner-Backend" examples/multi-backend/README.md

  # -------------------------------------------------------------------------
  # release-smoke — full build + install via pipx end-to-end. Runs on the
  # larger Linux runner. (Path-based gating to packaging-only PRs was
  # considered, but `github.event.pull_request.changed_files_paths` is
  # not actually available in the workflow context — would need a
  # separate dorny/paths-filter action. Deferred; keep it running on
  # every PR for now.)
  # -------------------------------------------------------------------------
  release-smoke:
    runs-on: ubuntu-latest-m
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install build + pipx
        # Hash-pin the bootstrap tools so Scorecard's Pinned-Dependencies
        # check passes (prior ``pip==X.Y.Z`` version-only pin was
        # flagged as #219/#220 — not strong enough for the "pin by
        # hash" rule). The requirements file is generated via
        # ``pip-compile --generate-hashes --allow-unsafe`` so pip
        # itself is included alongside build + pipx.
        run: |
          python -m pip install --require-hashes -r requirements/release-smoke.txt
          python -m pipx ensurepath
      - name: Build wheel
        run: |
          python -m build
      - name: Install built wheel with runtime extras
        run: |
          wheel_path="$(python -c "import glob; paths = sorted(glob.glob('dist/*.whl')); print(paths[0] if paths else '')")"
          test -n "$wheel_path"
          pipx install --force "${wheel_path}[all]"
      - name: End-to-end smoke
        run: |
          vaner init --path "$GITHUB_WORKSPACE" --no-interactive
          vaner doctor --path "$GITHUB_WORKSPACE" --json || true
          vaner precompute --path "$GITHUB_WORKSPACE"
          vaner query "summarize repository intent" --path "$GITHUB_WORKSPACE"
