name: publish-vscode-extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional successful build-vscode-extension run ID
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - name: Resolve build run ID
        id: resolve_run
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id }}
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_RUN_ID:-}" ]; then
            echo "run_id=${INPUT_RUN_ID}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id="$(
            gh run list \
              --workflow build-vscode-extension.yml \
              --branch main \
              --status success \
              --limit 50 \
              --json databaseId,headSha \
              --jq '.[] | select(.headSha == "'"${TAG_SHA}"'") | .databaseId' \
              | head -n 1
          )"

          if [ -z "${run_id}" ]; then
            echo "No successful build-vscode-extension.yml run found for sha ${TAG_SHA}." >&2
            echo "Re-run build-vscode-extension.yml on main or pass workflow_dispatch input run_id." >&2
            exit 1
          fi

          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Download VSIX artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.resolve_run.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p vsix
          gh run download "$RUN_ID" --name vsce-vsix --dir vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath ./vsix/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish ./vsix/*.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
