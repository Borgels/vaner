name: Docker release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    env:
      IMAGE_NAME: ghcr.io/borgels/vaner
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif

      - name: Generate SPDX SBOM for image
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload Trivy scan results to Security tab
        uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          sarif_file: trivy-results.sarif

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image with keyless OIDC
        env:
          IMAGE_DIGEST: ${{ steps.build_push.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"

      - name: Attest image SBOM
        env:
          IMAGE_DIGEST: ${{ steps.build_push.outputs.digest }}
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE_NAME}@${IMAGE_DIGEST}"
