name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      slsa_subjects: ${{ steps.slsa_subjects.outputs.value }}
    permissions:
      attestations: write
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --require-hashes -r requirements/release.txt
          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          export SOURCE_DATE_EPOCH
          python -m build
      - name: Generate SBOM
        run: cyclonedx-py requirements requirements/release.txt --output-format json --output-file sbom.json
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - name: Sign release artifacts with keyless Sigstore
        run: |
          set -euo pipefail
          for f in dist/* sbom.json; do
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "$f"
          done
      - name: Attest SBOM
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2
        with:
          subject-path: "dist/*"
          sbom-path: "sbom.json"
      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-dist
          path: |
            dist/*
            sbom.json
            dist/*.sigstore.json
            sbom.json.sigstore.json
      - name: Generate SLSA subjects
        id: slsa_subjects
        run: |
          set -euo pipefail
          {
            sha256sum dist/*
            sha256sum sbom.json
            sha256sum dist/*.sigstore.json
            sha256sum sbom.json.sigstore.json
          } | base64 --wrap=0 > /tmp/slsa-subjects.b64
          echo "value=$(cat /tmp/slsa-subjects.b64)" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: "dist/*"
      - name: Publish to PyPI
        if: ${{ vars.PYPI_PUBLISH == '1' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      - name: Attach artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Ensure the release exists (tag push normally creates it via release-drafter; be idempotent).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes
          fi
          # Collect assets into a deduped set so we don't pass the same sigstore
          # JSONs twice (dist/* already matches them alongside the wheel/sdist).
          # Prior runs hit `HTTP 422 ReleaseAsset.name already exists` when the
          # duplicates raced --clobber. Sort -u keeps the list canonical.
          assets=$(printf '%s\n' dist/* sbom.json sbom.json.sigstore.json | sort -u)
          # shellcheck disable=SC2086
          gh release upload "$TAG" $assets --clobber
          # 0.8.5 WS11 — auto-publish a drafted release after assets attach.
          # release-drafter creates a draft on every PR merge to main; the
          # draft becomes the tagged release but stays unpublished unless
          # we flip the draft bit here. Prior to this step v0.8.2 and
          # v0.8.3 tags had drafts that never shipped (user surfaced the
          # gap during 0.8.4). Publishing explicitly is idempotent on
          # already-published releases.
          is_draft=$(gh release view "$TAG" --json isDraft --jq .isDraft)
          if [ "$is_draft" = "true" ]; then
            echo "Publishing draft release $TAG"
            gh release edit "$TAG" --draft=false --latest
          fi

  slsa-provenance:
    needs: publish
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.slsa_subjects }}
      upload-assets: true

  verify:
    needs:
      - publish
      - slsa-provenance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: read
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist-assets
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - name: Install slsa-verifier
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/slsa-framework/slsa-verifier/releases/latest/download/slsa-verifier-linux-amd64 \
            -o /usr/local/bin/slsa-verifier
          chmod +x /usr/local/bin/slsa-verifier
      - name: Download provenance assets from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p provenance
          gh release download "$TAG" --pattern "*.intoto.jsonl" --dir provenance || true
      - name: Verify artifact signatures and attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify dist-assets/dist/* --repo "$GITHUB_REPOSITORY"
          provenance_file=""
          if compgen -G "provenance/*.intoto.jsonl" > /dev/null; then
            provenance_file="$(printf '%s\n' provenance/*.intoto.jsonl | head -n 1)"
          fi
          for artifact in dist-assets/dist/*; do
            bundle="${artifact}.sigstore.json"
            cosign verify-blob --bundle "$bundle" "$artifact"
            if [ -n "$provenance_file" ]; then
              slsa-verifier verify-artifact "$artifact" \
                --provenance-path "$provenance_file" \
                --source-uri "github.com/${GITHUB_REPOSITORY}" \
                --source-tag "${GITHUB_REF_NAME}"
            fi
          done
