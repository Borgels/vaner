name: Stale

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5be6feced9cbd229e42a451745f8e9c7fb8fefe1 # v9
        with:
          stale-issue-message: "This issue is stale. It will be closed in 14 days without activity."
          stale-pr-message: "This pull request is stale. It will be closed in 14 days without activity."
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
