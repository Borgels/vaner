name: Moat Guard

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  no-moat-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - name: Block forbidden directories
        run: |
          for p in eval infra scripts/data scripts/remote; do
            if [ -e "$p" ]; then
              echo "forbidden path present: $p"
              exit 1
            fi
          done
      - name: Block moat-sensitive filenames
        run: |
          set -euo pipefail
          bad="$(rg -n --hidden --glob '!.git/**' '(eval-at-scale|bundle-workflow|vaner_report|production-roadmap|release-audit)' . || true)"
          if [ -n "$bad" ]; then
            echo "$bad"
            exit 1
          fi
      - name: Block vaner-train imports
        run: |
          if rg -n 'import\s+vaner_train|from\s+vaner_train' src/; then
            exit 1
          fi
