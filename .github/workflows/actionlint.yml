name: Actionlint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rhysd/actionlint@v1
      - name: Zizmor
        uses: zizmorcore/zizmor-action@v0
        with:
          path: .github/workflows
