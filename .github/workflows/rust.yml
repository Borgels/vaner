name: Rust (vaner-contract)

# Only fire when the Rust workspace actually changes. The Python CI
# remains the authoritative check for everything else.
on:
  push:
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "tests/conformance-fixtures/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "tests/conformance-fixtures/**"
      - ".github/workflows/rust.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      # SHA-pinned per OpenSSF Scorecard / CodeQL Pinned-Dependencies
      # (alerts #223, #224). Dependabot owns the bump cadence — see
      # `.github/dependabot.yml` if you need to add an update channel.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-04-25
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
        with:
          workspaces: ". -> target"

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test (default features)
        run: cargo test --workspace --all-targets

      - name: test (no default features)
        run: cargo test --workspace --all-targets --no-default-features

      - name: test (ts-rs feature)
        run: cargo test --workspace --all-targets --features ts-rs

      # If the generated TypeScript bindings are ever committed (the
      # SvelteKit vendor lands at a later phase), uncomment this step so
      # the committed copy can't drift from the Rust source of truth.
      # - name: bindings drift check
      #   run: |
      #     if [ -n "$(git status --porcelain crates/vaner-contract/bindings)" ]; then
      #       echo "ts-rs bindings are stale. Run:"
      #       echo "  cargo test --features ts-rs --package vaner-contract"
      #       echo "and commit the diff."
      #       git diff crates/vaner-contract/bindings
      #       exit 1
      #     fi
